name: Lint

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          npm install -g markdownlint-cli
          python -m pip install yamllint

      - name: Markdown lint
        run: markdownlint .

      - name: YAML lint
        run: yamllint .
